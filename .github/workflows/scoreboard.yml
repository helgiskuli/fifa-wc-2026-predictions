name: scoreboard

# Rebuild the scoreboard from the latest results and deploy it to GitHub Pages.
# Stateless: nothing is committed back. Each run rebuilds from the committed
# DuckDB (historical seed) plus a fresh martj42 fetch, then publishes the HTML.
on:
  schedule:
    - cron: "0 7 * * *"   # daily 07:00 UTC; catches the prior day's late kickoffs
  workflow_dispatch: {}   # manual on-demand trigger

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-flight deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Persist the fitted-model cache across runs so fits warm-start (seconds).
      # The first-ever run has no cache and does a ~95s cold fit.
      - name: Restore model warm-start cache
        uses: actions/cache@v4
        with:
          path: model_cache.json
          key: model-cache-${{ github.run_id }}
          restore-keys: |
            model-cache-

      - name: Install dependencies
        run: uv sync

      - name: Fetch latest results
        run: uv run python -m scripts.fetch_results

      - name: Refresh upcoming picks
        run: uv run python -m scripts.run_schedule

      - name: Backfill pre-game picks for played matches
        run: uv run python -m scripts.backfill_predictions

      - name: Build scoreboard
        run: uv run python -m scripts.build_site

      # Publish only the rendered page, not the docs/superpowers specs alongside it.
      - name: Stage site
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
